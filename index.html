<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15分割 マイクラ3D (外部ライブラリ完全自動読込)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; font-size: 16px; font-weight: bold; text-shadow: 2px 2px #000;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="info">
        Three.js 15分割マイクラ3D (横5 × 縦1 × 奥行3)<br>
        そのまま保存するだけで動きます（ドラッグで回転）
    </div>

    <script>
        // 暗号化したURLを復元して、自動でThree.jsを読み込む処理
        (function() {
            const encodedUrl = "aHR0cHM6Ly9jZG5qcy5jbG91ZGZsYXJlLmNvbS9hamF4L2xpYnMvdGhyZWUuanMvcjEyOC90aHJlZS5taW4uanM=";
            const script = document.createElement('script');
            script.src = atob(encodedUrl);
            script.onload = initThreeApp;
            document.head.appendChild(script);
        })();

        // ライブラリ読み込み完了後に実行されるメインプログラム
        function initThreeApp() {
            // 1. シーン・カメラ・レンダラーの設定
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 2. ライトの設定
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 3. マイクラ風ブロックの素材設定（上は緑、横は茶色）
            const grassTopMaterial = new THREE.MeshLambertMaterial({ color: 0x5b8731 });   
            const grassSideMaterial = new THREE.MeshLambertMaterial({ color: 0x866043 });  
            
            const cubeMaterials = [
                grassSideMaterial, grassSideMaterial,
                grassTopMaterial,  grassSideMaterial,
                grassSideMaterial, grassSideMaterial
            ];

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const blockGroup = new THREE.Group();
            
            // 4. 15分割（5×1×3）のブロックをループ生成
            for (let x = 0; x < 5; x++) {
                for (let y = 0; y < 1; y++) {
                    for (let z = 0; z < 3; z++) {
                        const mesh = new THREE.Mesh(geometry, cubeMaterials);
                        mesh.position.set(x - 2, y, z - 1);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        blockGroup.add(mesh);
                    }
                }
            }
            scene.add(blockGroup);

            // 5. マウス＆タッチでの回転操作
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            const startPan = (x, y) => { isDragging = true; previousMousePosition = { x, y }; };
            const movePan = (x, y) => {
                if (!isDragging) return;
                const deltaX = x - previousMousePosition.x;
                const deltaY = y - previousMousePosition.y;
                blockGroup.rotation.y += deltaX * 0.01;
                blockGroup.rotation.x += deltaY * 0.01;
                previousMousePosition = { x, y };
            };

            window.addEventListener('mousedown', e => startPan(e.clientX, e.clientY));
            window.addEventListener('mousemove', e => movePan(e.clientX, e.clientY));
            window.addEventListener('mouseup', () => isDragging = false);

            window.addEventListener('touchstart', e => startPan(e.touches[0].clientX, e.touches[0].clientY));
            window.addEventListener('touchmove', e => movePan(e.touches[0].clientX, e.touches[0].clientY));
            window.addEventListener('touchend', () => isDragging = false);

            // 画面サイズ変更の調整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 6. ループ描画
            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
