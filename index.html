<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Voxel Demo (Creative) - J:Break K:Place</title>
<style>
  body { margin:0; overflow:hidden; background:#000; color:#fff; font-family:monospace; }
  #info { position: absolute; top:8px; left:8px; background:rgba(0,0,0,0.4); padding:8px; border-radius:4px; z-index:10; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="info">WASD move • Mouse look (click to lock) • J:Break • K:Place • R:regen</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js';
import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/controls/PointerLockControls.js';
// CONFIG
const CHUNK_SIZE = 16;
const WORLD_HEIGHT = 64;
const RENDER_DISTANCE = 3;
const SEA_LEVEL = 18;
const TILE_SIZE = 16;
const ATLAS_COLS = 4;
const ATLAS_ROWS = 2;

const AIR = 0, GRASS = 1, DIRT = 2, STONE = 3, SAND = 4, WATER = 5, LAVA = 6;
const BLOCKS = {
  1: {name:'grass', tile:0},
  2: {name:'dirt', tile:1},
  3: {name:'stone', tile:2},
  4: {name:'sand', tile:3},
  5: {name:'water', tile:4},
  6: {name:'lava', tile:5},
};

// THREE init
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(100,200,100);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// Controls
const controls = new PointerLockControls(camera, renderer.domElement);
document.addEventListener('click', ()=> controls.lock(), false);
scene.add(controls.getObject());

// Movement
const move = {forward:false,back:false,left:false,right:false};
let speed = 6;

// Resize
window.addEventListener('resize', ()=> {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Atlas canvas
const atlasCanvas = document.createElement('canvas');
atlasCanvas.width = TILE_SIZE * ATLAS_COLS;
atlasCanvas.height = TILE_SIZE * ATLAS_ROWS;
const actx = atlasCanvas.getContext('2d');

function drawPixelTile(x,y,color){
  actx.fillStyle=color;
  actx.fillRect(x,y, TILE_SIZE, TILE_SIZE);
  actx.fillStyle=shade(color, -0.12);
  actx.fillRect(x+TILE_SIZE-2,y+TILE_SIZE-2,2,2);
}
function shade(hex, amt){
  const c = parseInt(hex.slice(1),16);
  let r = ((c>>16)&255), g=((c>>8)&255), b=(c&255);
  r = Math.max(0,Math.min(255, Math.floor(r*(1+amt))));
  g = Math.max(0,Math.min(255, Math.floor(g*(1+amt))));
  b = Math.max(0,Math.min(255,Math.floor(b*(1+amt))));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

drawPixelTile(0,0,'#6b8f3f'); // grass
drawPixelTile(TILE_SIZE,0,'#7b4f2a'); // dirt
drawPixelTile(2*TILE_SIZE,0,'#8a8a8a'); // stone
drawPixelTile(3*TILE_SIZE,0,'#d9c98b'); // sand
drawPixelTile(0,TILE_SIZE,'#4ea7ff'); // water
drawPixelTile(TILE_SIZE,TILE_SIZE,'#ff6a00'); // lava

const atlasTexture = new THREE.CanvasTexture(atlasCanvas);
atlasTexture.magFilter = THREE.NearestFilter;
atlasTexture.minFilter = THREE.NearestMipMapNearestFilter;

// Helpers
function key(cx,cy,cz){ return `${cx},${cy},${cz}`; }

function pseudoNoise(x,z){
  const nx = x*0.08, nz = z*0.08;
  let v = Math.sin(nx*1.5 + nz*0.3)*0.5 + Math.cos(nx*0.4 - nz*0.7)*0.25;
  v += (Math.sin(nx*2.9 + nz*1.3)*0.12);
  return v;
}

const chunks = new Map();

function generateChunk(cx, cz){
  const blocks = new Uint8Array(CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE);
  for(let x=0;x<CHUNK_SIZE;x++){
    for(let z=0;z<CHUNK_SIZE;z++){
      const wx = cx*CHUNK_SIZE + x;
      const wz = cz*CHUNK_SIZE + z;
      const n = pseudoNoise(wx,wz);
      const height = Math.floor(SEA_LEVEL + n*8 + 4*Math.sin(wx*0.05)*Math.cos(wz*0.05));
      for(let y=0;y<WORLD_HEIGHT;y++){
        let id = AIR;
        if(y<=height){
          if(y > height-1) id = GRASS;
          else if(y > height-4) id = DIRT;
          else id = STONE;
        } else if(y <= SEA_LEVEL && y<=height+1){
          id = WATER;
        }
        if(id === GRASS && height <= SEA_LEVEL+1) id = SAND;
        if(y<5 && Math.random()<0.002) id = LAVA;
        blocks[index(x,y,z)] = id;
      }
    }
  }
  const c = {blocks, mesh:null};
  chunks.set(key(cx,0,cz), c);
  buildChunkMesh(cx,cz);
}

function index(x,y,z){ return (y*CHUNK_SIZE + z)*CHUNK_SIZE + x; }

function getBlock(wx,wy,wz){
  const cx = Math.floor(wx/CHUNK_SIZE);
  const cz = Math.floor(wz/CHUNK_SIZE);
  const lx = ((wx%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const lz = ((wz%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const chunk = chunks.get(key(cx,0,cz));
  if(!chunk) return AIR;
  if(wy<0 || wy>=WORLD_HEIGHT) return AIR;
  return chunk.blocks[index(lx,wy,lz)];
}

function setBlock(wx,wy,wz,id){
  const cx = Math.floor(wx/CHUNK_SIZE);
  const cz = Math.floor(wz/CHUNK_SIZE);
  const lx = ((wx%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const lz = ((wz%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
  const chunk = chunks.get(key(cx,0,cz));
  if(!chunk) return;
  if(wy<0 || wy>=WORLD_HEIGHT) return;
  chunk.blocks[index(lx,wy,lz)] = id;
  buildChunkMesh(cx,cz);
}

function buildChunkMesh(cx, cz){
  const chunk = chunks.get(key(cx,0,cz));
  if(!chunk) return;
  if(chunk.mesh){
    scene.remove(chunk.mesh);
    chunk.mesh.geometry.dispose();
    chunk.mesh.material.dispose();
    chunk.mesh = null;
  }
  const geometry = new THREE.BufferGeometry();
  const positions = [];
  const normals = [];
  const uvs = [];
  const indices = [];
  let vertIndex = 0;

  function faceCorners(x,y,z,nx,ny,nz){
    if(nx===1) return [[x+1,y,z],[x+1,y,z+1],[x+1,y+1,z+1],[x+1,y+1,z]];
    if(nx===-1) return [[x,y,z+1],[x,y,z],[x,y+1,z],[x,y+1,z+1]];
    if(nz===1) return [[x+1,y,z+1],[x,y,z+1],[x,y+1,z+1],[x+1,y+1,z+1]];
    if(nz===-1) return [[x,y,z],[x+1,y,z],[x+1,y+1,z],[x,y+1,z]];
    if(ny===1) return [[x,y+1,z],[x+1,y+1,z],[x+1,y+1,z+1],[x,y+1,z+1]];
    if(ny===-1) return [[x,y,z+1],[x+1,y,z+1],[x+1,y,z],[x,y,z]];
    return [[x,y,z],[x+1,y,z],[x+1,y+1,z+1],[x,y+1,z+1]];
  }

  function pushFace(px,py,pz, nx,ny,nz, tileIndex){
    const du = (tileIndex % ATLAS_COLS) / ATLAS_COLS;
    const dv = Math.floor(tileIndex / ATLAS_COLS) / ATLAS_ROWS;
    const su = 1/ATLAS_COLS, sv = 1/ATLAS_ROWS;
    const v = faceCorners(px,py,pz,nx,ny,nz);
    for(let i=0;i<4;i++){
      positions.push(...v[i]);
      normals.push(nx,ny,nz);
    }
    uvs.push(du, dv+sv);
    uvs.push(du+su, dv+sv);
    uvs.push(du+su, dv);
    uvs.push(du, dv);
    indices.push(vertIndex, vertIndex+1, vertIndex+2, vertIndex, vertIndex+2, vertIndex+3);
    vertIndex +=4;
  }

  for(let x=0;x<CHUNK_SIZE;x++){
    for(let z=0;z<CHUNK_SIZE;z++){
      for(let y=0;y<WORLD_HEIGHT;y++){
        const id = chunk.blocks[index(x,y,z)];
        if(id===AIR) continue;
        const wx = cx*CHUNK_SIZE + x;
        const wy = y;
        const wz = cz*CHUNK_SIZE + z;
        const npos = [
          [wx+1,wy,wz,1,0,0],
          [wx-1,wy,wz,-1,0,0],
          [wx,wy+1,wz,0,1,0],
          [wx,wy-1,wz,0,-1,0],
          [wx,wy,wz+1,0,0,1],
          [wx,wy,wz-1,0,0,-1],
        ];
        for(const nb of npos){
          const nbid = getBlock(nb[0],nb[1],nb[2]);
          const show = (nbid===AIR) || (isFluid(id) && nbid!==id && nbid!==AIR);
          if(show){
            const tile = (BLOCKS[id] && BLOCKS[id].tile != null) ? BLOCKS[id].tile : 0;
            pushFace(wx,wy,wz, nb[3],nb[4],nb[5], tile);
          }
        }
      }
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals,3));
  geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
  geometry.setIndex(indices);
  geometry.computeBoundingSphere();

  const mat = new THREE.MeshLambertMaterial({map:atlasTexture, transparent:true, alphaTest:0.5});
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(cx*CHUNK_SIZE,0,cz*CHUNK_SIZE);
  scene.add(mesh);
  chunk.mesh = mesh;
}

function isFluid(id){ return id===WATER || id===LAVA; }

function genAround(px,pz){
  const pcx = Math.floor(px/CHUNK_SIZE);
  const pcz = Math.floor(pz/CHUNK_SIZE);
  for(let dx=-RENDER_DISTANCE; dx<=RENDER_DISTANCE; dx++){
    for(let dz=-RENDER_DISTANCE; dz<=RENDER_DISTANCE; dz++){
      const cx = pcx+dx, cz = pcz+dz;
      if(!chunks.has(key(cx,0,cz))) generateChunk(cx,cz);
    }
  }
}

controls.getObject().position.set(0, SEA_LEVEL+10, 0);
camera.position.copy(controls.getObject().position);
genAround(0,0);

// Input
document.addEventListener('keydown', (e)=>{
  if(e.code==='KeyW') move.forward=true;
  if(e.code==='KeyS') move.back=true;
  if(e.code==='KeyA') move.left=true;
  if(e.code==='KeyD') move.right=true;
  if(e.code==='KeyR'){
    for(const k of chunks.keys()) {
      const c = chunks.get(k);
      if(c.mesh){ scene.remove(c.mesh); c.mesh.geometry.dispose(); c.mesh.material.dispose(); }
    }
    chunks.clear();
    genAround(controls.getObject().position.x, controls.getObject().position.z);
  }
  if(e.code==='KeyJ') actionBreak();
  if(e.code==='KeyK') actionPlace();
});
document.addEventListener('keyup', (e)=>{
  if(e.code==='KeyW') move.forward=false;
  if(e.code==='KeyS') move.back=false;
  if(e.code==='KeyA') move.left=false;
  if(e.code==='KeyD') move.right=false;
});

// Ray-based pick
function pickBlock(maxDist=6){
  const origin = controls.getObject().position.clone();
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(controls.getObject().quaternion).normalize();
  for(let d=0.2; d<=maxDist; d+=0.2){
    const px = Math.floor(origin.x + dir.x * d);
    const py = Math.floor(origin.y + dir.y * d);
    const pz = Math.floor(origin.z + dir.z * d);
    const id = getBlock(px,py,pz);
    if(id!==AIR) return {x:px,y:py,z:pz,id};
  }
  return null;
}

function actionBreak(){
  const hit = pickBlock(6);
  if(!hit) return;
  setBlock(hit.x,hit.y,hit.z, AIR);
}

function actionPlace(){
  const hit = pickBlock(6);
  const origin = controls.getObject().position.clone();
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(controls.getObject().quaternion).normalize();
  if(hit){
    for(let d=0.2; d<=6; d+=0.2){
      const px = Math.floor(origin.x + dir.x * d);
      const py = Math.floor(origin.y + dir.y * d);
      const pz = Math.floor(origin.z + dir.z * d);
      const id = getBlock(px,py,pz);
      if(id===AIR){
        setBlock(px,py,pz, GRASS);
        return;
      }
    }
  } else {
    const px = Math.floor(origin.x + dir.x * 3);
    const py = Math.floor(origin.y + dir.y * 3);
    const pz = Math.floor(origin.z + dir.z * 3);
    if(getBlock(px,py,pz)===AIR) setBlock(px,py,pz, GRASS);
  }
}

// Simple fluid tick
function fluidTick(){
  const toSet = [];
  for(const [k,chunk] of chunks){
    for(let x=0;x<CHUNK_SIZE;x++) for(let z=0;z<CHUNK_SIZE;z++) for(let y=0;y<WORLD_HEIGHT;y++){
      const id = chunk.blocks[index(x,y,z)];
      if(id===WATER || id===LAVA){
        const wx = parseInt(k.split(',')[0])*CHUNK_SIZE + x;
        const wz = parseInt(k.split(',')[2])*CHUNK_SIZE + z;
        const below = getBlock(wx,y-1,wz);
        if(below===AIR){
          toSet.push({x:wx,y:y-1,z:wz,id:id});
        } else {
          const dirs = [[1,0],[ -1,0],[0,1],[0,-1]];
          for(const d of dirs){
            const nx = wx+d[0], nz = wz+d[1];
            if(getBlock(nx,y,nz)===AIR){
              if(Math.random()<0.02) toSet.push({x:nx,y:y,z:nz,id:id});
            }
          }
        }
      }
    }
  }
  for(const s of toSet) setBlock(s.x,s.y,s.z,s.id);
}

// Animation
const clock = new THREE.Clock();
let fluidTimer = 0;
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const dir = new THREE.Vector3();
  if(move.forward) dir.z -= 1;
  if(move.back) dir.z += 1;
  if(move.left) dir.x -=1;
  if(move.right) dir.x +=1;
  dir.normalize().applyQuaternion(controls.getObject().quaternion);
  controls.getObject().position.addScaledVector(dir, speed * dt);
  camera.position.copy(controls.getObject().position);
  genAround(controls.getObject().position.x, controls.getObject().position.z);
  fluidTimer += dt;
  if(fluidTimer > 0.5){ fluidTick(); fluidTimer = 0; }
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
